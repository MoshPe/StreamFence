host: 127.0.0.1
port: 9090
transportMode: WS
pingIntervalMs: 15000
pingTimeoutMs: 30000
maxFramePayloadLength: 6291456
maxHttpContentLength: 6291456
authMode: NONE
spillRootPath: .streamfence-spill
namespaces:
  /non-reliable:
    authRequired: false
  /reliable:
    authRequired: false
  /bulk:
    authRequired: false
topicPolicies:
  - namespace: /non-reliable
    topic: prices
    deliveryMode: BEST_EFFORT
    overflowAction: SPILL_TO_DISK
    maxQueuedMessagesPerClient: 8
    maxQueuedBytesPerClient: 1024
    ackTimeoutMs: 1000
    maxRetries: 0
    coalesce: false
    allowPolling: true
    authRequired: false
  - namespace: /reliable
    topic: alerts
    deliveryMode: BEST_EFFORT
    overflowAction: REJECT_NEW
    maxQueuedMessagesPerClient: 8
    maxQueuedBytesPerClient: 1024
    ackTimeoutMs: 1000
    maxRetries: 0
    coalesce: false
    allowPolling: true
    authRequired: false
  - namespace: /bulk
    topic: uploads
    deliveryMode: BEST_EFFORT
    overflowAction: REJECT_NEW
    maxQueuedMessagesPerClient: 8
    maxQueuedBytesPerClient: 1024
    ackTimeoutMs: 1000
    maxRetries: 0
    coalesce: false
    allowPolling: true
    authRequired: false
